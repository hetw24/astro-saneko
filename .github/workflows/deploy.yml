name: Deploy Saneko Blog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          echo "Build output (static):"
          ls -la dist/
          test -f dist/index.html && echo "index.html OK" || (echo "index.html missing!" && exit 1)

      - name: Create target directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 强制创建目录（-p 自动创建上级目录）
            mkdir -p /var/www/sites/saneko
            # 提前设置目录权限，避免上传后权限错误
            chown -R www-data:www-data /var/www/sites/saneko
            chmod -R 755 /var/www/sites/saneko

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "dist/*"
          target: "/var/www/sites/saneko"
          strip_components: 1
          overwrite: true

      - name: Fix permissions and restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            chown -R www-data:www-data /var/www/sites/saneko
            chmod -R 755 /var/www/sites/saneko
            chmod 644 /var/www/sites/saneko/index.html

            # 验证文件是否上传成功
            echo "=== Deployed files ==="
            cd /var/www/sites/saneko
            ls -la | head -20
            test -f index.html && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)

            # 验证 Nginx 配置并重启
            echo "=== Restart Nginx ==="
            nginx -t && systemctl restart nginx
            echo "✅ Nginx restarted successfully"